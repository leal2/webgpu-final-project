<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">
    <title>WebGPU 2D Physics Sim</title>
    <style>
        body { background: #121212; color: white; }
        .canvas-container { display: flex; justify-content: center; background: #000; border-radius: 8px; overflow: hidden; }
        #description { padding: 20px; background: #1e1e1e; border-radius: 8px; }
        label { font-weight: bold; margin-top: 10px; display: block; }
        .count-display { float: right; color: #007bff; }
    </style>
</head>
<body>
    <div class="container-fluid mt-4">
        <div class="row">
            <div class="col-md-8 canvas-container">
                <canvas id="webgpu-canvas" width="1600" height="1600" style="width: 100%; height: auto; aspect-ratio: 1/1;"></canvas>
            </div>
            <div class="col-md-4">
                <div id="description">
                    <h4>Physics Simulation</h4>
                    <p class="text-muted">Compute-shader driven particles with shape-specific attraction.</p>
                    <hr style="border-color: #444;">
                    
                    <label>Circles <span id="circle-val" class="count-display">200</span></label>
                    <input id="circle-count" type="range" class="custom-range" min="0" max="1000" value="200">

                    <label>Triangles <span id="tri-val" class="count-display">200</span></label>
                    <input id="tri-count" type="range" class="custom-range" min="0" max="1000" value="200">

                    <label>Stars <span id="star-val" class="count-display">200</span></label>
                    <input id="star-count" type="range" class="custom-range" min="0" max="1000" value="200">

                    <button id="reset-btn" class="btn btn-outline-primary btn-block mt-4">Reset Simulation</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
